let currentType = "all";
let currentEra = "all";

// Restore filter state from sessionStorage
function restoreState() {
  const saved = sessionStorage.getItem("idFilterState");
  if (!saved) return;
  const state = JSON.parse(saved);
  currentType = state.type || "all";
  currentEra = state.era || "all";
  const q = state.q || "";
  document.getElementById("search").value = q;
  document.querySelectorAll("#type-filters .filter-btn").forEach(b => {
    if (b.textContent.trim() === currentType || (currentType === "all" && b.textContent.trim() === "All")) b.classList.add("active");
    else b.classList.remove("active");
  });
  // Re-activate era button by matching onclick attribute value
  document.querySelectorAll("#era-filters .filter-btn").forEach(b => {
    const match = b.getAttribute("onclick").includes(`'${currentEra}'`);
    b.classList.toggle("active", match);
  });
}

function saveState() {
  sessionStorage.setItem("idFilterState", JSON.stringify({
    type: currentType,
    era: currentEra,
    q: document.getElementById("search").value
  }));
}

function renderCards(items) {
  const grid = document.getElementById("grid");
  const count = document.getElementById("count");
  grid.innerHTML = "";
  count.textContent = `Showing ${items.length} of ${data.length} entries`;
  items.forEach(d => {
    const eraTags = d.tags.filter(t => t.startsWith("era:")).map(t => t.replace("era:",""));
    const styleTags = d.tags.filter(t => t.startsWith("style:")).map(t => t.replace("style:",""));
    const typeTags = d.tags.filter(t => t.startsWith("type:")).map(t => t.replace("type:",""));
    const collabTags = d.tags.filter(t => t.startsWith("collab:")).map(t => t.replace("collab:",""));
    const typeLabel = d.type === "designer" ? "Designer" : d.type === "company" ? "Company" : "Studio / Organization";
    const inner = `
      <div class="card-type ${d.type}">${typeLabel}</div>
      <div class="card-name">${d.name}</div>
      ${d.dates ? `<div class="card-dates">${d.dates}</div>` : ""}
      <div class="tags">
        ${eraTags.map(t => `<span class="tag era">${t}</span>`).join("")}
        ${styleTags.map(t => `<span class="tag style">${t}</span>`).join("")}
        ${typeTags.map(t => `<span class="tag type">${t}</span>`).join("")}
        ${collabTags.map(t => `<span class="tag collab">↔ ${t}</span>`).join("")}
      </div>
      ${d.page ? "" : `<div class="card-unbuilt">Page not yet built</div>`}
    `;
    let card;
    if (d.page) {
      card = document.createElement("a");
      card.className = "card has-page";
      card.href = d.page;
      card.addEventListener("click", saveState);
    } else {
      card = document.createElement("div");
      card.className = "card";
    }
    card.innerHTML = inner;
    grid.appendChild(card);
  });
}

function filterCards() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = data.filter(d => {
    const matchType = currentType === "all" || d.type === currentType;
    const matchEra = currentEra === "all" || d.tags.some(t => t === "era:" + currentEra);
    const matchSearch = !q ||
      d.name.toLowerCase().includes(q) ||
      (d.dates && d.dates.toLowerCase().includes(q)) ||
      d.tags.some(t => t.toLowerCase().includes(q));
    return matchType && matchEra && matchSearch;
  });
  renderCards(filtered);
}

function onSearch() { filterCards(); }

function setTypeFilter(val, btn) {
  currentType = val;
  document.querySelectorAll("#type-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterCards();
}

function setEraFilter(val, btn) {
  currentEra = val;
  document.querySelectorAll("#era-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  filterCards();
}

function setTagFilter(btn) {
  document.querySelectorAll("#type-filters .filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const filtered = data.filter(d => d.tags.includes("type:Favorite"));
  renderCards(filtered);
}

restoreState();
filterCards();
</script>
