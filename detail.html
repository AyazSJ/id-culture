  backLink.href = "index.html";
}

// ── Render static info ────────────────────────────────────────────────
if (entry) {
  document.getElementById("info-name").textContent = entry.name;
  document.getElementById("info-dates").textContent = entry.dates || "";

  const eraTags = entry.tags.filter(t => t.startsWith("era:")).map(t => t.replace("era:",""));
  const styleTags = entry.tags.filter(t => t.startsWith("style:")).map(t => t.replace("style:",""));
  const typeTags = entry.tags.filter(t => t.startsWith("type:")).map(t => t.replace("type:",""));
  const collabTags = entry.tags.filter(t => t.startsWith("collab:")).map(t => t.replace("collab:",""));
  document.getElementById("info-tags").innerHTML = [
    ...eraTags.map(t => `<span class="tag era">${t}</span>`),
    ...styleTags.map(t => `<span class="tag style">${t}</span>`),
    ...typeTags.map(t => `<span class="tag type">${t}</span>`),
    ...collabTags.map(t => `<span class="tag collab">↔ ${t}</span>`)
  ].join("");

  loadWikipedia(entry.name);
} else {
  document.getElementById("hero-placeholder").textContent = "Entry not found";
  document.getElementById("info-name").textContent = nameParam || "Unknown";
  document.getElementById("info-extract").textContent = "No data found for this entry.";
  document.getElementById("info-extract").classList.remove("loading");
}

// ── Wikipedia fetch ───────────────────────────────────────────────────
async function loadWikipedia(name) {
  // Clean name for search — strip parenthetical qualifiers for better results
  const searchName = name.replace(/\s*\(.*?\)\s*/g, "").trim();
  const encoded = encodeURIComponent(searchName);
  const summaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encoded}`;
  const imagesUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encoded}&prop=images&imlimit=30&format=json&origin=*`;
  const imageInfoBase = `https://en.wikipedia.org/w/api.php?action=query&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=600&format=json&origin=*&titles=`;

  // 1. Summary + hero image
  try {
    const res = await fetch(summaryUrl);
    const json = await res.json();
    if (json.type !== "disambiguation" && json.extract) {
      const extract = json.extract.split(". ").slice(0, 4).join(". ") + ".";
      const el = document.getElementById("info-extract");
      el.textContent = extract;
      el.classList.remove("loading");

      const wikiPageUrl = json.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encoded}`;
      const link = document.createElement("a");
      link.href = wikiPageUrl;
      link.target = "_blank";
      link.rel = "noopener";
      link.className = "wiki-link";
      link.textContent = "Read full Wikipedia article →";
      el.parentNode.insertBefore(link, el.nextSibling);

      // Hero image
      if (json.thumbnail?.source) {
        setHero(json.thumbnail.source, json.originalimage?.source, "Wikipedia");
      }
    } else {
      document.getElementById("info-extract").textContent = "No Wikipedia article found for this entry.";
      document.getElementById("info-extract").classList.remove("loading");
    }
  } catch (e) {
    document.getElementById("info-extract").textContent = "Could not load Wikipedia summary.";
    document.getElementById("info-extract").classList.remove("loading");
  }

  // 2. Image grid
  try {
    const res = await fetch(imagesUrl);
    const json = await res.json();
    const pages = Object.values(json.query?.pages || {});
    if (!pages.length || !pages[0].images) { showNoImages(); return; }

    // Filter out icons, SVGs, logos
    const imageFiles = pages[0].images
      .map(i => i.title)
      .filter(t => /\.(jpg|jpeg|png)$/i.test(t) && !/(flag|logo|map|icon|sig|portrait|coat)/i.test(t));

    if (!imageFiles.length) { showNoImages(); return; }

    // Fetch image URLs in batches of 10
    const batches = [];
    for (let i = 0; i < Math.min(imageFiles.length, 30); i += 10) {
      batches.push(imageFiles.slice(i, i + 10));
    }

    const allImages = [];
    for (const batch of batches) {
      const titles = batch.map(encodeURIComponent).join("|");
      const r = await fetch(imageInfoBase + titles);
      const j = await r.json();
      const imgs = Object.values(j.query?.pages || {});
      imgs.forEach(p => {
        const info = p.imageinfo?.[0];
        if (info?.url && /\.(jpg|jpeg|png)$/i.test(info.url)) {
          const caption = info.extmetadata?.ImageDescription?.value?.replace(/<[^>]+>/g,"").trim() || p.title.replace("File:","").replace(/\.[^.]+$/,"");
          allImages.push({ url: info.url, caption, thumbUrl: info.url });
        }
      });
    }

    if (!allImages.length) { showNoImages(); return; }

    // If no hero yet, use first image as hero
    const heroEl = document.getElementById("hero");
    if (!heroEl.querySelector("img") && allImages[0]) {
      setHero(allImages[0].url, allImages[0].url, "Wikipedia");
    }

    renderImageGrid(allImages);
  } catch(e) {
    showNoImages();
  }
}

function setHero(thumbSrc, fullSrc, credit) {
  const hero = document.getElementById("hero");
  hero.innerHTML = "";
  const img = document.createElement("img");
  img.src = thumbSrc;
  img.alt = nameParam;
  img.onerror = () => { hero.innerHTML = `<div class="hero-placeholder">No image available</div>`; };
  if (fullSrc) {
    const a = document.createElement("a");
    a.href = fullSrc;
    a.target = "_blank";
    a.rel = "noopener";
    a.appendChild(img);
    hero.appendChild(a);
  } else {
    hero.appendChild(img);
  }
  if (credit) {
    const c = document.createElement("div");
    c.className = "hero-credit";
    c.textContent = `Image: ${credit}`;
    hero.appendChild(c);
  }
}

function renderImageGrid(images) {
  const grid = document.getElementById("image-grid");
  const title = document.getElementById("grid-title");
  grid.innerHTML = "";
  title.style.display = "block";
  images.forEach(img => {
    const card = document.createElement("div");
    card.className = "img-card";
    card.innerHTML = `
      <a href="${img.url}" target="_blank" rel="noopener">
        <img src="${img.url}" alt="${img.caption}" loading="lazy" onerror="this.parentElement.parentElement.style.display='none'">
      </a>
      <div class="img-card-caption">${img.caption}</div>
    `;
    grid.appendChild(card);
  });
}

function showNoImages() {
  const msg = document.getElementById("state-msg");
  msg.style.display = "block";
  msg.textContent = "No images found on Wikipedia for this entry. Try searching collections at MoMA, V&A, or the Cooper Hewitt.";
  document.getElementById("hero-placeholder").textContent = "No image available";
}
</script>
